<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="tomatoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5a5f"></stop>
      <stop offset="100%" stop-color="#d90429"></stop>
    </linearGradient>

    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"></stop>
      <stop offset="100%" stop-color="#16a34a"></stop>
    </linearGradient>
  </defs>

  <!-- Tomato body -->
  <circle cx="64" cy="70" r="44" fill="url(#tomatoGradient)"></circle>

  <!-- Shine -->
  <ellipse cx="48" cy="52" rx="12" ry="7" fill="rgba(255,255,255,0.35)"></ellipse>
  <ellipse cx="48" cy="52" rx="12" ry="7" fill="#ffffff" opacity="0.25"></ellipse>

  <!-- Timer line -->
  <path d="M32 72 A32 32 0 0 1 96 72" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-dasharray="6 10"></path>

  <!-- Play pointer -->
  <polygon points="92,66 104,72 92,78" fill="#ffffff" opacity="0.95"></polygon>

  <!-- Leaves -->
  <path d="M64 18
           C58 28,50 28,42 24
           C48 34,50 40,48 46
           C56 40,62 36,64 30
           C66 36,72 40,80 46
           C78 40,80 34,86 24
           C78 28,70 28,64 18Z" fill="url(#leafGradient)"></path>

  <!-- Stem -->
  <rect x="59" y="10" width="10" height="18" rx="4" fill="#15803d"></rect>
</svg>